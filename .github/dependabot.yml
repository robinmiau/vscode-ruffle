version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "robinmiau"
    assignees:
      - "robinmiau"
    commit-message:
      prefix: "chore"
      include: "scope"
    allow:
      - dependency-name: "@ruffle-rs/*"
